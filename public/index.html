<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neron — Interface Vocale</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="gradient-bg"></div>

  <!-- Main app -->
  <div id="app">
    <header class="header" id="header">
      <h1 class="logo">Neron</h1>
      <p class="tagline">INTERFACE VOCALE</p>
    </header>

    <main class="main">
      <!-- Orb central -->
      <div class="orb-section">
        <button class="orb-wrapper" id="orbBtn" aria-label="Parler à Neron">
          <div class="orb-glow" id="orbGlow"></div>
          <div class="orb-ring ring-1" id="ring1"></div>
          <div class="orb-ring ring-2" id="ring2"></div>
          <div class="orb" id="orb">
            <div class="orb-highlight"></div>
            <svg class="orb-icon" id="orbIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
              <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
              <line x1="12" y1="19" x2="12" y2="23"/>
              <line x1="8" y1="23" x2="16" y2="23"/>
            </svg>
          </div>
        </button>

        <!-- Waveform -->
        <div class="waveform" id="waveform" aria-hidden="true">
          <div class="waveform-bars" id="waveformBars"></div>
        </div>

        <p class="status-label" id="statusLabel">Appuyer pour parler</p>
      </div>

      <!-- Log de conversation -->
      <div class="conversation" id="conversation" aria-live="polite"></div>
    </main>

    <!-- Bouton settings -->
    <button class="settings-btn" id="settingsBtn" aria-label="Paramètres">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </div>

  <!-- Modal Settings -->
  <div class="modal-overlay" id="settingsModal" role="dialog" aria-modal="true" aria-label="Paramètres">
    <div class="modal-sheet">
      <div class="modal-header">
        <h2 class="modal-title">Configuration</h2>
        <button class="modal-close" id="settingsClose" aria-label="Fermer">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>

      <div class="modal-field">
        <label class="field-label" for="coreUrlInput">Core URL</label>
        <input class="field-input" id="coreUrlInput" type="url" placeholder="http://localhost:8000" autocomplete="off" spellcheck="false" />
      </div>

      <div class="modal-field">
        <label class="field-label" for="sttUrlInput">STT URL</label>
        <input class="field-input" id="sttUrlInput" type="url" placeholder="http://localhost:8001" autocomplete="off" spellcheck="false" />
      </div>

      <button class="save-btn" id="saveSettings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
        Enregistrer
      </button>
    </div>
  </div>

  <script src="/js/app.js?v=3?v=2"></script>
</body>
</html>
